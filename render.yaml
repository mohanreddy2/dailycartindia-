services:
  - type: web
    name: dailycart-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements-filtered.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: dailycart
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://dailycartindia.com,https://www.dailycartindia.com
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  - type: web
    name: dailycart-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci --legacy-peer-deps && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
